/* weekend & holiday column colors */

<script>
const PL_MONTHS = ['Styczeń','Luty','Marzec','Kwiecień','Maj','Czerwiec','Lipiec','Sierpień','Wrzesień','Październik','Listopad','Grudzień'];
const PL_DAYS   = ['Nd','Pn','Wt','Śr','Cz','Pt','Sb'];
const STATUSES  = ['OBECNY','UŻ','URLOP','NIE PRACUJE'];
const S_CLASS   = { 'OBECNY':'obecny','UŻ':'uz','URLOP':'urlop','NIE PRACUJE':'nie' };
const GROUP_COLORS = ['#c8e6c9','#bbdefb','#ffe0b2','#e1bee7','#ffccbc','#b2dfdb','#f8bbd0','#f0f4c3'];
const GROUP_COLORS_DARK = ['#2e7d32','#1565c0','#e65100','#6a1b9a','#bf360c','#00695c','#880e4f','#827717'];

const GRAPH = 'https://graph.microsoft.com/v1.0';
const SCOPES = ['User.Read', 'Sites.ReadWrite.All'];

let msalInstance = null, account = null, siteId = null, listId = null;
let viewYear, viewMonth;
// employees: array of { name, group }
let employees = [];
// groups: array of { id, name }
let groups = [];
let monthStatuses = {};
let spItemIds = {};
let saveTimer = null;

// ── MSAL ──────────────────────────────────────────────────────
function initMsal() {
  msalInstance = new msal.PublicClientApplication({
    auth: { clientId: CONFIG.clientId, authority: 'https://login.microsoftonline.com/' + CONFIG.tenantId, redirectUri: CONFIG.redirectUri },
    cache: { cacheLocation: 'sessionStorage' }
  });
  msalInstance.initialize().then(() => {
    msalInstance.handleRedirectPromise().then(resp => {
      if (resp) account = resp.account;
      else { let a = msalInstance.getAllAccounts(); if (a.length) account = a[0]; }
      if (account) startApp();
    }).catch(e => showAuthError(e));
  });
}
document.getElementById('login-btn').addEventListener('click', () => msalInstance && msalInstance.loginRedirect({ scopes: SCOPES }));
document.getElementById('logout-btn').addEventListener('click', () => msalInstance.logoutPopup().then(() => location.reload()));

async function getToken() {
  try { return (await msalInstance.acquireTokenSilent({ scopes: SCOPES, account })).accessToken; }
  catch { return (await msalInstance.acquireTokenPopup({ scopes: SCOPES })).accessToken; }
}
async function graphGet(url) {
  let r = await fetch(GRAPH + url, { headers: { Authorization: 'Bearer ' + await getToken() } });
  if (!r.ok) throw new Error(await r.text()); return r.json();
}
async function graphPost(url, body) {
  let r = await fetch(GRAPH + url, { method: 'POST', headers: { Authorization: 'Bearer ' + await getToken(), 'Content-Type': 'application/json' }, body: JSON.stringify(body) });
  if (!r.ok) throw new Error(await r.text()); return r.json();
}
async function graphPatch(url, body) {
  let r = await fetch(GRAPH + url, { method: 'PATCH', headers: { Authorization: 'Bearer ' + await getToken(), 'Content-Type': 'application/json' }, body: JSON.stringify(body) });
  if (!r.ok) throw new Error(await r.text()); return r.json();
}
async function graphDelete(url) {
  await fetch(GRAPH + url, { method: 'DELETE', headers: { Authorization: 'Bearer ' + await getToken() } });
}

// ── Start ──────────────────────────────────────────────────────
async function startApp() {
  showLoading('Łączenie z SharePoint...');
  document.getElementById('auth-screen').style.display = 'none';
  document.getElementById('app').style.display = 'block';
  document.getElementById('user-info').textContent = account.name || account.username;
  try {
    let siteUrl = CONFIG.sharePointSite.replace('https://', '');
    let host = siteUrl.split('/')[0], path = siteUrl.split('/').slice(1).join('/');
    let siteResp = path ? await graphGet('/sites/' + host + ':/' + path) : await graphGet('/sites/' + host + ':/');
    siteId = siteResp.id;
    let listsResp = await graphGet('/sites/' + siteId + '/lists?$top=200');
    let found = listsResp.value.find(l => l.displayName === CONFIG.listName || l.name === CONFIG.listName);
    if (!found) throw new Error('Nie znaleziono listy "' + CONFIG.listName + '"');
    listId = found.id;
    await loadFromSharePoint();
    hideLoading();
  } catch(e) { hideLoading(); showToast('Błąd: ' + e.message); loadDemoData(); }
}

// ── SharePoint data ────────────────────────────────────────────
async function loadFromSharePoint() {
  showLoading('Ładowanie danych...');
  let resp = await graphGet('/sites/' + siteId + '/lists/' + listId + '/items?$expand=fields&$top=999');
  employees = []; groups = []; monthStatuses = {}; spItemIds = {};

  let empItem = resp.value.find(i => i.fields.Title === '__employees__');
  if (empItem) {
    try {
      let parsed = JSON.parse(empItem.fields.Statusy || '{}');
      employees = parsed.employees || [];
      groups = parsed.groups || [];
    } catch { employees = []; groups = []; }
    spItemIds['__employees__'] = empItem.id;
  }
  if (!employees.length) employees = [];
  if (!groups.length) groups = [];

  resp.value.filter(i => i.fields.Title !== '__employees__').forEach(item => {
    let f = item.fields, mk = f.Rok + '_' + f.Miesiac;
    if (!monthStatuses[mk]) monthStatuses[mk] = {};
    try { Object.assign(monthStatuses[mk], JSON.parse(f.Statusy || '{}')); } catch {}
    spItemIds[mk + '_' + f.Title] = item.id;
  });

  let now = new Date(); viewYear = now.getFullYear(); viewMonth = now.getMonth();
  renderTable(); renderGroupPanel();
  hideLoading();
}

async function saveEmployees() {
  let body = { fields: { Title: '__employees__', Statusy: JSON.stringify({ employees, groups }), Miesiac: '0', Rok: 0 } };
  if (spItemIds['__employees__']) await graphPatch('/sites/' + siteId + '/lists/' + listId + '/items/' + spItemIds['__employees__'], body);
  else { let r = await graphPost('/sites/' + siteId + '/lists/' + listId + '/items', body); spItemIds['__employees__'] = r.id; }
}

async function saveMonthForEmployee(emp, y, m) {
  let mk = y + '_' + m, s = monthStatuses[mk] || {};
  let empS = {}; Object.keys(s).filter(k => k.startsWith(emp + '||')).forEach(k => empS[k] = s[k]);
  let spKey = mk + '_' + emp;
  let body = { fields: { Title: emp, Miesiac: String(m), Rok: y, Statusy: JSON.stringify(empS) } };
  if (spItemIds[spKey]) await graphPatch('/sites/' + siteId + '/lists/' + listId + '/items/' + spItemIds[spKey], body);
  else { let r = await graphPost('/sites/' + siteId + '/lists/' + listId + '/items', body); spItemIds[spKey] = r.id; }
}

async function deleteEmployeeData(empName) {
  let toDelete = Object.keys(spItemIds).filter(k => k.endsWith('_' + empName) && k !== '__employees__');
  for (let k of toDelete) { await graphDelete('/sites/' + siteId + '/lists/' + listId + '/items/' + spItemIds[k]); delete spItemIds[k]; }
}

function scheduleSave(emp) {
  setSaveDot('saving');
  if (saveTimer) clearTimeout(saveTimer);
  saveTimer = setTimeout(async () => {
    try { if (siteId) await saveMonthForEmployee(emp, viewYear, viewMonth); setSaveDot('saved'); setTimeout(() => setSaveDot(''), 2000); }
    catch(e) { showToast('Błąd zapisu: ' + e.message); setSaveDot(''); }
  }, 800);
}
function setSaveDot(s) { document.getElementById('save-dot').className = 'save-dot' + (s ? ' ' + s : ''); }

// ── Helpers ────────────────────────────────────────────────────
function monthKey(y,m) { return y+'_'+m; }
function getStatuses(y,m) { let k=monthKey(y,m); if(!monthStatuses[k]) monthStatuses[k]={}; return monthStatuses[k]; }
function sKey(emp,day) { return emp+'||'+day; }
function getDays(y,m) { return new Date(y,m+1,0).getDate(); }
function isWE(y,m,d) { let w=new Date(y,m,d).getDay(); return w===0||w===6; }

// Polish public holidays (fixed + Easter-based)
function getPolishHolidays(y) {
  // Easter calculation (Anonymous Gregorian)
  function easter(yr) {
    let a=yr%19, b=Math.floor(yr/100), c=yr%100;
    let d=Math.floor(b/4), e=b%4, f=Math.floor((b+8)/25);
    let g=Math.floor((b-f+1)/3), h=(19*a+b-d-g+15)%30;
    let i=Math.floor(c/4), k=c%4, l=(32+2*e+2*i-h-k)%7;
    let m2=Math.floor((a+11*h+22*l)/451);
    let month=Math.floor((h+l-7*m2+114)/31)-1;
    let day=((h+l-7*m2+114)%31)+1;
    return new Date(yr, month, day);
  }
  let e = easter(y);
  let add = (date, days) => { let d=new Date(date); d.setDate(d.getDate()+days); return d; };
  let fmt = d => d.getMonth() + '_' + d.getDate();
  let holidays = new Set([
    '0_1',   // Nowy Rok
    '0_6',   // Trzech Króli
    '4_1',   // Święto Pracy
    '4_3',   // Święto Konstytucji 3 Maja
    '7_15',  // Wniebowzięcie NMP
    '10_1',  // Wszystkich Świętych
    '10_11', // Święto Niepodległości
    '11_25', // Boże Narodzenie
    '11_26', // Drugi dzień Bożego Narodzenia
    fmt(e),            // Wielkanoc
    fmt(add(e, 1)),    // Poniedziałek Wielkanocny
    fmt(add(e, 49)),   // Zesłanie Ducha Świętego
    fmt(add(e, 60)),   // Boże Ciało
  ]);
  return holidays;
}

function getDayClass(y,m,d) {
  let holidays = getPolishHolidays(y);
  let key = m + '_' + d;
  if (holidays.has(key)) return 'col-hol';
  let dow = new Date(y,m,d).getDay();
  if (dow===0||dow===6) return 'col-we';
  return '';
}
function getGroupIdx(groupId) { return groups.findIndex(g => g.id === groupId); }
function loadDemoData() {
  let now = new Date(); viewYear=now.getFullYear(); viewMonth=now.getMonth();
  groups = [{id:'g1',name:'Magazyn'},{id:'g2',name:'Biuro'}];
  employees = [{name:'Jan Kowalski',group:'g1'},{name:'Anna Nowak',group:'g1'},{name:'Piotr Wiśniewski',group:'g2'}];
  monthStatuses = {}; renderTable(); renderGroupPanel();
}

// ── Group panel ────────────────────────────────────────────────
function renderGroupPanel() {
  let list = document.getElementById('group-list');
  list.innerHTML = '';
  groups.forEach((g, gi) => {
    let chip = document.createElement('div');
    chip.className = 'group-chip';
    chip.style.borderColor = GROUP_COLORS_DARK[gi % GROUP_COLORS_DARK.length];
    chip.style.background = GROUP_COLORS[gi % GROUP_COLORS.length];
    chip.innerHTML = '<div class="group-dot" style="background:' + GROUP_COLORS_DARK[gi % GROUP_COLORS_DARK.length] + '"></div>' +
      '<input value="' + g.name.replace(/"/g,'&quot;') + '" data-gi="' + gi + '" />' +
      '<button class="chip-del" data-gi="' + gi + '">✕</button>';
    list.appendChild(chip);
  });
  list.querySelectorAll('input').forEach(inp => {
    inp.addEventListener('change', async function() {
      groups[+this.dataset.gi].name = this.value.trim() || groups[+this.dataset.gi].name;
      if (siteId) { setSaveDot('saving'); await saveEmployees(); setSaveDot('saved'); setTimeout(() => setSaveDot(''), 2000); }
      renderTable();
    });
  });
  list.querySelectorAll('.chip-del').forEach(btn => {
    btn.addEventListener('click', async function() {
      let gi = +this.dataset.gi, gid = groups[gi].id;
      if (!confirm('Usunąć grupę? Pracownicy zostaną bez grupy.')) return;
      groups.splice(gi, 1);
      employees.forEach(e => { if (e.group === gid) e.group = ''; });
      if (siteId) { setSaveDot('saving'); await saveEmployees(); setSaveDot('saved'); setTimeout(() => setSaveDot(''), 2000); }
      renderGroupPanel(); renderTable();
    });
  });
}

document.getElementById('groups-btn').addEventListener('click', () => {
  let p = document.getElementById('group-panel');
  p.style.display = p.style.display === 'none' ? 'block' : 'none';
});

document.getElementById('add-group-btn').addEventListener('click', async () => {
  let newId = 'g' + Date.now();
  groups.push({ id: newId, name: 'Nowa grupa' });
  if (siteId) { setSaveDot('saving'); await saveEmployees(); setSaveDot('saved'); setTimeout(() => setSaveDot(''), 2000); }
  renderGroupPanel(); renderTable();
});

// ── Render table ───────────────────────────────────────────────
function renderTable() {
  let days = getDays(viewYear, viewMonth);
  let statuses = getStatuses(viewYear, viewMonth);
  document.getElementById('month-label').textContent = PL_MONTHS[viewMonth] + ' ' + viewYear;

  let hRow = document.getElementById('header-row');
  hRow.innerHTML = '<th style="width:36px">#</th><th>Pracownik</th>';
  for (let d = 1; d <= days; d++) {
    let dow = new Date(viewYear, viewMonth, d).getDay();
    let cls = getDayClass(viewYear, viewMonth, d);
    let holidays = getPolishHolidays(viewYear);
    let isHol = holidays.has(viewMonth + '_' + d);
    let dayLabel = d + '<br><span style="font-weight:400">' + PL_DAYS[dow] + '</span>' + (isHol ? '<br><span style="font-size:8px;color:#a4262c">🇵🇱</span>' : '');
    hRow.innerHTML += '<th' + (cls ? ' class="' + cls + '"' : '') + '>' + dayLabel + '</th>';
  }

  let tbody = document.getElementById('table-body');
  tbody.innerHTML = '';

  // Sort employees by group, keeping order within group
  let grouped = {};
  let noGroup = [];
  employees.forEach((emp, origIdx) => {
    if (emp.group && groups.find(g => g.id === emp.group)) {
      if (!grouped[emp.group]) grouped[emp.group] = [];
      grouped[emp.group].push({ emp, origIdx });
    } else {
      noGroup.push({ emp, origIdx });
    }
  });

  let orderNum = 1;
  let colspan = days + 2;

  function renderEmployeeRow(emp, origIdx, groupIdx) {
    let tr = document.createElement('tr');
    if (groupIdx >= 0) tr.className = 'g' + (groupIdx % 8);

    // Number cell
    let numTd = document.createElement('td');
    numTd.textContent = orderNum++;
    tr.appendChild(numTd);

    // Name cell
    let ntd = document.createElement('td');
    // Group selector
    let grpSel = document.createElement('select');
    grpSel.className = 'grp-sel';
    let optNone = document.createElement('option');
    optNone.value = ''; optNone.textContent = '—';
    if (!emp.group) optNone.selected = true;
    grpSel.appendChild(optNone);
    groups.forEach(g => {
      let o = document.createElement('option');
      o.value = g.id; o.textContent = g.name;
      if (emp.group === g.id) o.selected = true;
      grpSel.appendChild(o);
    });
    grpSel.dataset.ei = origIdx;
    grpSel.addEventListener('change', async function() {
      employees[+this.dataset.ei].group = this.value;
      if (siteId) { setSaveDot('saving'); await saveEmployees(); setSaveDot('saved'); setTimeout(() => setSaveDot(''), 2000); }
      renderTable();
    });

    ntd.innerHTML = '<div class="name-cell"></div>';
    let nameCell = ntd.querySelector('.name-cell');
    nameCell.appendChild(grpSel);
    let nameInp = document.createElement('input');
    nameInp.className = 'name-input';
    nameInp.value = emp.name;
    nameInp.dataset.ei = origIdx;
    nameCell.appendChild(nameInp);
    let delBtn = document.createElement('button');
    delBtn.className = 'del-btn'; delBtn.dataset.ei = origIdx; delBtn.textContent = '✕';
    nameCell.appendChild(delBtn);
    tr.appendChild(ntd);

    for (let d = 1; d <= days; d++) {
      let td = document.createElement('td');
      let cls = getDayClass(viewYear, viewMonth, d);
      if (cls) td.classList.add(cls);
      let val = statuses[sKey(emp.name, d)] || 'OBECNY';
      let sel = document.createElement('select');
      sel.className = 'ss ' + (S_CLASS[val] || 'obecny');
      STATUSES.forEach(opt => {
        let o = document.createElement('option');
        o.value = opt; o.textContent = opt; if (opt === val) o.selected = true;
        sel.appendChild(o);
      });
      sel.dataset.emp = emp.name; sel.dataset.day = d;
      sel.addEventListener('change', function() {
        getStatuses(viewYear, viewMonth)[sKey(this.dataset.emp, this.dataset.day)] = this.value;
        this.className = 'ss ' + (S_CLASS[this.value] || 'obecny');
        scheduleSave(this.dataset.emp);
      });
      td.appendChild(sel); tr.appendChild(td);
    }
    tbody.appendChild(tr);

    // Name change event
    nameInp.addEventListener('change', async function() {
      let ei = +this.dataset.ei, oldName = employees[ei].name;
      let newName = this.value.trim() || oldName;
      this.value = newName;
      employees[ei].name = newName;
      Object.keys(monthStatuses).forEach(mk => {
        let s = monthStatuses[mk];
        Object.keys(s).filter(k => k.startsWith(oldName + '||')).forEach(k => {
          s[sKey(newName, k.split('||')[1])] = s[k]; delete s[k];
        });
      });
      Object.keys(spItemIds).filter(k => k.endsWith('_' + oldName)).forEach(k => {
        spItemIds[k.replace('_' + oldName, '_' + newName)] = spItemIds[k]; delete spItemIds[k];
      });
      setSaveDot('saving');
      if (siteId) { await saveEmployees(); await saveMonthForEmployee(newName, viewYear, viewMonth); }
      setSaveDot('saved'); setTimeout(() => setSaveDot(''), 2000);
    });

    // Delete event
    delBtn.addEventListener('click', async function() {
      let ei = +this.dataset.ei, empName = employees[ei].name;
      if (!confirm('Usunąć pracownika "' + empName + '" ze wszystkich miesięcy?')) return;
      employees.splice(ei, 1);
      Object.keys(monthStatuses).forEach(mk => {
        Object.keys(monthStatuses[mk]).filter(k => k.startsWith(empName + '||')).forEach(k => delete monthStatuses[mk][k]);
      });
      showLoading('Usuwanie...');
      if (siteId) { await deleteEmployeeData(empName); await saveEmployees(); }
      hideLoading(); renderTable();
    });
  }

  // Render grouped employees
  groups.forEach((g, gi) => {
    if (!grouped[g.id] || !grouped[g.id].length) return;
    // Group header
    let headerTr = document.createElement('tr');
    headerTr.className = 'group-header';
    let headerTd = document.createElement('td');
    headerTd.colSpan = colspan;
    headerTd.innerHTML = '<span style="background:' + GROUP_COLORS[gi % GROUP_COLORS.length] + ';color:' + GROUP_COLORS_DARK[gi % GROUP_COLORS_DARK.length] + ';padding:2px 8px;border-radius:10px;margin-right:6px;font-size:10px">●</span>' + g.name;
    headerTr.appendChild(headerTd);
    tbody.appendChild(headerTr);
    grouped[g.id].forEach(({ emp, origIdx }) => renderEmployeeRow(emp, origIdx, gi));
  });

  // Ungrouped employees
  if (noGroup.length) {
    let headerTr = document.createElement('tr');
    headerTr.className = 'group-header';
    let headerTd = document.createElement('td');
    headerTd.colSpan = colspan;
    headerTd.textContent = 'Bez grupy';
    headerTr.appendChild(headerTd);
    tbody.appendChild(headerTr);
    noGroup.forEach(({ emp, origIdx }) => renderEmployeeRow(emp, origIdx, -1));
  }
}

// ── Navigation ─────────────────────────────────────────────────
document.getElementById('prev-month').addEventListener('click', () => { viewMonth--; if(viewMonth<0){viewMonth=11;viewYear--;} renderTable(); });
document.getElementById('next-month').addEventListener('click', () => { viewMonth++; if(viewMonth>11){viewMonth=0;viewYear++;} renderTable(); });

document.getElementById('add-employee').addEventListener('click', async () => {
  employees.push({ name: 'Nowy pracownik', group: '' });
  renderTable();
  let inputs = document.querySelectorAll('.name-input');
  if (inputs.length) { let last = inputs[inputs.length-1]; last.focus(); last.select(); }
  if (siteId) { setSaveDot('saving'); await saveEmployees(); setSaveDot('saved'); setTimeout(() => setSaveDot(''), 2000); }
});

// ── XLSX export ────────────────────────────────────────────────
document.getElementById('export-btn').addEventListener('click', () => {
  let wb = XLSX.utils.book_new();
  let days = getDays(viewYear, viewMonth);
  let statuses = getStatuses(viewYear, viewMonth);
  let header = ['#', 'Grupa', 'Pracownik'];
  let holidays = getPolishHolidays(viewYear);
  for (let d = 1; d <= days; d++) {
    let dow = new Date(viewYear, viewMonth, d).getDay();
    let isHol = holidays.has(viewMonth + '_' + d);
    header.push(d + ' ' + PL_DAYS[dow] + (isHol ? ' 🇵🇱' : ''));
  }
  let rows = [header];
  let num = 1;
  groups.forEach(g => {
    let empInGroup = employees.filter(e => e.group === g.id);
    if (!empInGroup.length) return;
    rows.push([g.name.toUpperCase(), '', '', ...Array(days).fill('')]);
    empInGroup.forEach(emp => {
      let row = [num++, g.name, emp.name];
      for (let d = 1; d <= days; d++) row.push(statuses[sKey(emp.name, d)] || 'OBECNY');
      rows.push(row);
    });
  });
  let ungrouped = employees.filter(e => !e.group || !groups.find(g => g.id === e.group));
  if (ungrouped.length) {
    rows.push(['BEZ GRUPY', '', '', ...Array(days).fill('')]);
    ungrouped.forEach(emp => {
      let row = [num++, '', emp.name];
      for (let d = 1; d <= days; d++) row.push(statuses[sKey(emp.name, d)] || 'OBECNY');
      rows.push(row);
    });
  }
  let ws = XLSX.utils.aoa_to_sheet(rows);
  XLSX.utils.book_append_sheet(wb, ws, PL_MONTHS[viewMonth].substring(0,3) + '_' + viewYear);
  XLSX.writeFile(wb, 'Obecnosc_' + PL_MONTHS[viewMonth] + '_' + viewYear + '.xlsx');
});

function showLoading(txt) { document.getElementById('loading-text').textContent = txt||'Ładowanie...'; document.getElementById('loading').classList.remove('hidden'); }
function hideLoading() { document.getElementById('loading').classList.add('hidden'); }
function showAuthError(e) { let el=document.getElementById('auth-error'); el.textContent='Błąd: '+(e.message||e); el.style.display='block'; }
function showToast(msg) { let t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),3500); }

initMsal();
</script>
